# === Guardian Security Config ===
# Controls model switching behavior and access control
guardian:
  # Pin a specific model — blocks ALL client-triggered switches to other models.
  # Only system startup and force=True can override this.
  # Set to null or remove to allow free switching.
  pinned_model: "GLM-4.7-Flash-Claude-Opus-Reasoning"
  
  # Allowlist of client names that may trigger model switches.
  # Empty list = unrestricted (all clients can switch — backward compat).
  # If populated, only these clients can trigger auto-switch.
  # Client names come from api_keys.json "name" field.
  switch_allowlist:
    - "m0nk111"
    - "oelala"

  # Auto-unload llama-server after N minutes of inactivity to free VRAM for
  # ComfyUI or other GPU-heavy tasks. Set to null (or remove) to disable.
  # When a new request arrives while unloaded, the model auto-reloads (~30s).
  # Example: 10 = unload after 10 minutes idle.
  idle_unload_minutes: 5
